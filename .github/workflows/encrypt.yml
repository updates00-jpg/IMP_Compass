name: Encrypt & Deploy

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/**'

jobs:
  encrypt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install StaticCrypt
        run: npm install -g staticrypt@latest

      - name: Encrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          staticrypt index.html --short --remember false
          cp encrypted/index.html index.html

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (git commit -m "chore: encrypt [skip ci]" && git push)
