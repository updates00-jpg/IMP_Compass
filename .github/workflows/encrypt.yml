name: Encrypt & Deploy

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/**'

jobs:
  encrypt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install StaticCrypt
        run: npm install -g staticrypt@latest

      - name: Encrypt index.html
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          staticrypt index.html \
            --password "$SITE_PASSWORD" \
            --short \
            --no-remember \
            --template-title "IMP Compass" \
            --template-instructions "Enter mission access password" \
            --template-placeholder "Mission password" \
            --template-button "ACCESS" \
            2>&1
          ls -la

      - name: Move encrypted file to root
        run: |
          if [ -f "encrypted/index.html" ]; then
            cp encrypted/index.html index.html
            echo "Copied from encrypted/"
          fi
          ls -la *.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: auto-encrypt [skip ci]" && git push
